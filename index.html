<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            background: #1a1a2e;
            color: #eee;
        }

        .left-panel {
            width: 25%;
            display: flex;
            flex-direction: column;
        }

        .filter-section {
            height: 40%;
            padding: 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            overflow-y: auto;
        }

        .filter-section h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .filter-group {
            margin-bottom: 16px;
        }

        .filter-group-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #eee;
            font-size: 13px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #e94560;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            margin-top: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #0f3460;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: #1a1a2e;
        }

        .search-result-item .rarity {
            font-weight: bold;
            margin-right: 6px;
        }

        .search-result-item .type {
            color: #888;
            font-size: 11px;
            margin-left: 6px;
        }

        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 8px;
            background: #1a1a2e;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .filter-option:hover {
            background: #0f3460;
        }

        .filter-option input {
            display: none;
        }

        .filter-option .checkmark {
            width: 12px;
            height: 12px;
            border: 2px solid #e94560;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .filter-option.selected .checkmark {
            background: #e94560;
        }

        .filter-option.selected .checkmark::after {
            content: "✓";
            color: #fff;
            font-size: 9px;
        }

        .item-list-section {
            height: 60%;
            background: #0f3460;
            overflow-y: auto;
        }

        .item-list-header {
            padding: 12px 20px;
            background: #16213e;
            border-bottom: 1px solid #1a1a2e;
            font-size: 14px;
            color: #e94560;
            position: sticky;
            top: 0;
        }

        .item-list {
            padding: 10px;
        }

        .item-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #16213e;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .item-card:hover {
            background: #1a1a2e;
        }

        .item-card.selected {
            border-color: #e94560;
            background: #1a1a2e;
        }

        .item-icon {
            font-size: 24px;
            width: 36px;
            text-align: center;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-size: 13px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #888;
        }

        .item-rarity {
            font-weight: bold;
        }

        .rarity-6 { color: #FFD700; }
        .rarity-5 { color: #9966FF; }
        .rarity-4 { color: #6699FF; }

        .item-attrs {
            font-size: 10px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .right-panel {
            width: 75%;
            background: #16213e;
            display: flex;
            flex-direction: column;
        }

        .detail-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .detail-icon {
            font-size: 64px;
            background: #0f3460;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .detail-title {
            flex: 1;
        }

        .detail-title h1 {
            font-size: 26px;
            margin-bottom: 6px;
        }

        .detail-title .meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #aaa;
        }

        .detail-title .type-icon {
            font-size: 16px;
        }

        .detail-content {
            padding: 25px 30px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .detail-section {
            margin-bottom: 0;
        }

        .detail-section h3 {
            color: #e94560;
            font-size: 13px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #0f3460;
        }

        .attr-display {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .attr-tag {
            padding: 6px 14px;
            background: #1a1a2e;
            border-radius: 16px;
            font-size: 12px;
        }

        .attr-tag.pos1 {
            border: 1px solid #e94560;
            color: #e94560;
        }

        .attr-tag.pos2 {
            border: 1px solid #4ecca3;
            color: #4ecca3;
        }

        .attr-tag.pos3 {
            border: 1px solid #ffd700;
            color: #ffd700;
        }

        .obtain-section h3 {
            color: #4ecca3;
        }

        .dungeon-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dungeon-item {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 12px 16px;
        }

        .dungeon-name {
            font-size: 13px;
            color: #eee;
            margin-bottom: 8px;
        }

        .dungeon-pools {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
        }

        .pool-tag {
            display: inline-block;
            padding: 2px 6px;
            background: #16213e;
            border-radius: 3px;
            margin: 2px;
        }

        .pool-tag.s2 {
            border-left: 2px solid #4ecca3;
        }

        .pool-tag.s3 {
            border-left: 2px solid #ffd700;
        }

        .related-items {
            border-top: 1px solid #0f3460;
            padding-top: 10px;
        }

        .related-title {
            font-size: 11px;
            color: #666;
            margin-bottom: 6px;
        }

        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .related-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: #16213e;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .related-item:hover {
            background: #0f3460;
        }

        .related-item.current {
            border: 1px solid #e94560;
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .no-obtain {
            color: #666;
            font-size: 13px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            .left-panel {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .filter-section {
                flex: 0 0 auto;
                max-height: 35vh;
                padding: 12px 15px;
                overflow-y: auto;
            }

            .filter-section h3 {
                font-size: 13px;
                margin-bottom: 10px;
            }

            .filter-group {
                margin-bottom: 10px;
            }

            .filter-group-title {
                font-size: 11px;
                margin-bottom: 5px;
            }

            .filter-options {
                gap: 4px;
            }

            .filter-option {
                padding: 6px 10px;
                font-size: 11px;
            }

            .item-list-section {
                flex: 1;
                min-height: 0;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                background: #0f3460;
            }

            .item-list {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                padding: 10px;
            }

            .item-list-header {
                padding: 10px 15px;
                font-size: 13px;
            }

            .item-card {
                padding: 12px;
            }

            .item-icon {
                font-size: 28px;
                width: 42px;
            }

            .item-name {
                font-size: 14px;
            }

            .item-meta {
                font-size: 12px;
            }

            .item-attrs {
                font-size: 11px;
            }

            .right-panel {
                width: 100%;
                min-height: 50vh;
                display: none;
            }

            .right-panel.active {
                display: flex;
            }

            .detail-header {
                padding: 15px;
                flex-wrap: wrap;
                gap: 15px;
            }

            .detail-icon {
                font-size: 48px;
                width: 70px;
                height: 70px;
            }

            .detail-title h1 {
                font-size: 20px;
            }

            .detail-title .meta {
                font-size: 12px;
                gap: 8px;
            }

            .detail-content {
                padding: 15px;
                gap: 16px;
            }

            .attr-display {
                gap: 8px;
            }

            .attr-tag {
                padding: 5px 10px;
                font-size: 11px;
            }

            .dungeon-item {
                padding: 10px 12px;
            }

            .dungeon-name {
                font-size: 13px;
            }

            .dungeon-pools {
                font-size: 10px;
            }

            .mobile-back-btn {
                display: block;
                position: fixed;
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                background: #e94560;
                border-radius: 50%;
                color: #fff;
                font-size: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 1000;
                box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
                -webkit-tap-highlight-color: transparent;
            }

            .mobile-filter-toggle {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 15px;
                background: #16213e;
                border-bottom: 1px solid #0f3460;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
            }

            .mobile-filter-toggle span {
                font-size: 13px;
                color: #e94560;
            }

            .mobile-filter-toggle .toggle-icon {
                font-size: 18px;
                transition: transform 0.3s;
            }

            .mobile-filter-toggle.collapsed .toggle-icon {
                transform: rotate(-180deg);
            }

            .filter-section.collapsed {
                display: none;
            }

            .item-list-section {
                height: calc(50vh - 40px);
            }
        }

        @media (min-width: 769px) {
            .mobile-back-btn {
                display: none !important;
            }
            .mobile-filter-toggle {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="mobile-filter-toggle" id="filter-toggle">
            <span>⚙️ 属性筛选</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div class="filter-section" id="filter-section">
            <div class="search-box">
                <input type="text" id="weapon-search" placeholder="搜索武器名称..." autocomplete="off">
                <div class="search-results" id="search-results"></div>
            </div>
            <div class="filter-group">
                <div class="filter-group-title">武器类型</div>
                <div class="filter-options" id="weapon-type-options"></div>
            </div>
            <h3>属性筛选</h3>
            <div class="filter-group">
                <div class="filter-group-title">Type 1</div>
                <div class="filter-options" id="type1-options"></div>
            </div>
            <div class="filter-group">
                <div class="filter-group-title">Type 2</div>
                <div class="filter-options" id="type2-options"></div>
            </div>
            <div class="filter-group">
                <div class="filter-group-title">Type 3</div>
                <div class="filter-options" id="type3-options"></div>
            </div>
        </div>
        <div class="item-list-section">
            <div class="item-list-header">命中武器 (<span id="item-count">0</span>)</div>
            <div class="item-list" id="item-list"></div>
        </div>
    </div>
    <div class="right-panel" id="detail-panel">
        <div class="empty-state">
            <div class="empty-state-icon">⚔️</div>
            <div>选择武器查看详情</div>
        </div>
    </div>
    <div class="mobile-back-btn" id="mobile-back-btn">←</div>

    <script>
        let TYPE_ICONS = {};
        let DUNGEONS = [];
        let ALL_S1 = [];
        let WEAPON_TYPES = [];
        let DATA = { items: [], type1_options: [], type2_options: [], type3_options: [] };
        const selectedFilters = { type1: [], type2: [], type3: [] };
        const selectedWeaponTypes = [];
        let selectedItemId = null;

        async function loadData() {
            const [typeIcons, dungeons, filters, weapons] = await Promise.all([
                fetch('data/type-icons.json').then(r => r.json()),
                fetch('data/dungeons.json').then(r => r.json()),
                fetch('data/filters.json').then(r => r.json()),
                fetch('data/weapons.json').then(r => r.json())
            ]);
            TYPE_ICONS = typeIcons;
            DUNGEONS = dungeons;
            ALL_S1 = filters.type1_options;
            WEAPON_TYPES = [...new Set(weapons.map(w => w.type))].sort();
            DATA = { items: weapons, ...filters };
        }

        function init() {
            renderWeaponTypeOptions();
            renderFilterOptions();
            initSearch();
            filterItems();

            const filterToggle = document.getElementById('filter-toggle');
            const filterSection = document.getElementById('filter-section');
            const detailPanel = document.getElementById('detail-panel');
            const mobileBackBtn = document.getElementById('mobile-back-btn');

            filterToggle.addEventListener('click', () => {
                filterSection.classList.toggle('collapsed');
                filterToggle.classList.toggle('collapsed');
            });

            mobileBackBtn.addEventListener('click', () => {
                detailPanel.classList.remove('active');
                mobileBackBtn.style.display = 'none';
            });

            const originalRenderDetail = renderDetail;
            renderDetail = function() {
                originalRenderDetail();
                if (window.innerWidth <= 768 && selectedItemId) {
                    detailPanel.classList.add('active');
                    mobileBackBtn.style.display = 'flex';
                }
            };

            const originalRenderItemList = renderItemList;
            renderItemList = function(items) {
                originalRenderItemList(items);
                if (window.innerWidth <= 768) {
                    document.querySelectorAll('.item-card').forEach(card => {
                        card.addEventListener('click', () => {
                            detailPanel.classList.add('active');
                            mobileBackBtn.style.display = 'flex';
                        });
                    });
                }
            };
        }

        loadData().then(init);

        function renderWeaponTypeOptions() {
            const container = document.getElementById('weapon-type-options');
            container.innerHTML = WEAPON_TYPES.map(type => `
                <div class="filter-option" data-type="${type}">
                    <span class="checkmark"></span>
                    <span>${getTypeIcon(type)} ${type}</span>
                </div>
            `).join('');

            container.addEventListener('click', (e) => {
                const option = e.target.closest('.filter-option');
                if (!option) return;
                const type = option.dataset.type;
                if (option.classList.contains('selected')) {
                    option.classList.remove('selected');
                    const idx = selectedWeaponTypes.indexOf(type);
                    if (idx > -1) selectedWeaponTypes.splice(idx, 1);
                } else {
                    option.classList.add('selected');
                    selectedWeaponTypes.push(type);
                }
                filterItems();
            });
        }

        function initSearch() {
            const searchInput = document.getElementById('weapon-search');
            const searchResults = document.getElementById('search-results');

            searchInput.addEventListener('input', () => {
                const query = searchInput.value.trim().toLowerCase();
                if (query.length === 0) {
                    searchResults.classList.remove('active');
                    return;
                }
                const matches = DATA.items.filter(item => item.name.toLowerCase().includes(query));
                if (matches.length === 0) {
                    searchResults.innerHTML = '<div class="search-result-item" style="color:#888">无匹配武器</div>';
                } else if (matches.length > 10) {
                    searchResults.innerHTML = matches.slice(0, 10).map(item => `
                        <div class="search-result-item" data-id="${item.id}">
                            <span class="rarity ${getRarityClass(item.rarity)}">${"★".repeat(item.rarity)}</span>
                            ${item.name}
                            <span class="type">${item.type}</span>
                        </div>
                    `).join('') + `<div class="search-result-item" style="color:#888">...还有 ${matches.length - 10} 项</div>`;
                } else {
                    searchResults.innerHTML = matches.map(item => `
                        <div class="search-result-item" data-id="${item.id}">
                            <span class="rarity ${getRarityClass(item.rarity)}">${"★".repeat(item.rarity)}</span>
                            ${item.name}
                            <span class="type">${item.type}</span>
                        </div>
                    `).join('');
                }
                searchResults.classList.add('active');
            });

            searchResults.addEventListener('click', (e) => {
                const item = e.target.closest('.search-result-item[data-id]');
                if (item) {
                    const id = parseInt(item.dataset.id);
                    selectWeaponById(id);
                    searchInput.value = '';
                    searchResults.classList.remove('active');
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-box')) {
                    searchResults.classList.remove('active');
                }
            });
        }

        function selectWeaponById(id) {
            selectedItemId = id;
            selectedFilters.type1 = [];
            selectedFilters.type2 = [];
            selectedFilters.type3 = [];
            selectedWeaponTypes.length = 0;
            document.querySelectorAll('#weapon-type-options .filter-option').forEach(l => l.classList.remove('selected'));
            document.querySelectorAll('#type1-options .filter-option, #type2-options .filter-option, #type3-options .filter-option').forEach(l => l.classList.remove('selected'));
            filterItems();
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            const card = document.querySelector(`.item-card[data-id="${id}"]`);
            if (card) card.classList.add('selected');
            renderDetail();
            if (window.innerWidth <= 768) {
                document.getElementById('detail-panel').classList.add('active');
                document.getElementById('mobile-back-btn').style.display = 'flex';
            }
        }

        function getRarityClass(rarity) {
            return `rarity-${rarity}`;
        }

        function getTypeIcon(type) {
            return TYPE_ICONS[type] || "📦";
        }

        function getAvailableDungeons(item) {
            return DUNGEONS.filter(d => d.type2_pool.includes(item.type2) && d.type3_pool.includes(item.type3));
        }

        function combinations(arr, k) {
            const result = [];
            function backtrack(start, combo) {
                if (combo.length === k) {
                    result.push([...combo]);
                    return;
                }
                for (let i = start; i < arr.length; i++) {
                    combo.push(arr[i]);
                    backtrack(i + 1, combo);
                    combo.pop();
                }
            }
            backtrack(0, []);
            return result;
        }

        function getRelatedItemsByS2(dungeon, s1Combo, s2Option, currentItemId) {
            return DATA.items.filter(item => {
                if (item.id === currentItemId) return false;
                if (!s1Combo.includes(item.type1)) return false;
                if (item.type2 !== s2Option) return false;
                if (!dungeon.type3_pool.includes(item.type3)) return false;
                return true;
            });
        }

        function getRelatedItemsByS3(dungeon, s1Combo, s3Option, currentItemId) {
            return DATA.items.filter(item => {
                if (item.id === currentItemId) return false;
                if (!s1Combo.includes(item.type1)) return false;
                if (!dungeon.type2_pool.includes(item.type2)) return false;
                if (item.type3 !== s3Option) return false;
                return true;
            });
        }

        function renderFilterOptions() {
            const containers = {
                type1: document.getElementById('type1-options'),
                type2: document.getElementById('type2-options'),
                type3: document.getElementById('type3-options')
            };

            Object.entries(containers).forEach(([key, container]) => {
                const options = DATA[`${key}_options`];
                container.innerHTML = options.map(opt => `
                    <label class="filter-option" data-attr="${key}" data-value="${opt}">
                        <input type="checkbox" value="${opt}">
                        <span class="checkmark"></span>
                        <span>${opt}</span>
                    </label>
                `).join('');
            });

            document.querySelectorAll('#type1-options .filter-option, #type2-options .filter-option, #type3-options .filter-option').forEach(label => {
                label.addEventListener('click', (e) => {
                    e.preventDefault();
                    label.classList.toggle('selected');
                    const attr = label.dataset.attr;
                    const value = label.dataset.value;
                    const idx = selectedFilters[attr].indexOf(value);
                    if (idx > -1) {
                        selectedFilters[attr].splice(idx, 1);
                    } else {
                        selectedFilters[attr].push(value);
                    }
                    filterItems();
                });
            });
        }

        function filterItems() {
            const filtered = DATA.items.filter(item => {
                const attr1Match = selectedFilters.type1.length === 0 || selectedFilters.type1.includes(item.type1);
                const attr2Match = selectedFilters.type2.length === 0 || selectedFilters.type2.includes(item.type2);
                const attr3Match = selectedFilters.type3.length === 0 || selectedFilters.type3.includes(item.type3);
                const typeMatch = selectedWeaponTypes.length === 0 || selectedWeaponTypes.includes(item.type);
                return attr1Match && attr2Match && attr3Match && typeMatch;
            });

            renderItemList(filtered);
            if (selectedItemId && !filtered.find(i => i.id === selectedItemId)) {
                selectedItemId = null;
                renderDetail();
            }
        }

        function renderItemList(items) {
            document.getElementById('item-count').textContent = items.length;
            const container = document.getElementById('item-list');
            container.innerHTML = items.map(item => `
                <div class="item-card ${item.id === selectedItemId ? 'selected' : ''}" data-id="${item.id}">
                    <div class="item-icon">${getTypeIcon(item.type)}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-meta">
                            <span class="item-rarity ${getRarityClass(item.rarity)}">${"★".repeat(item.rarity)}</span>
                            <span>${item.type}</span>
                        </div>
                        <div class="item-attrs">${item.type1} · ${item.type2} · ${item.type3}</div>
                    </div>
                </div>
            `).join('');

            container.querySelectorAll('.item-card').forEach(card => {
                card.addEventListener('click', () => {
                    selectedItemId = parseInt(card.dataset.id);
                    document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    renderDetail();
                });
            });
        }

        function renderDetail() {
            const panel = document.getElementById('detail-panel');
            if (!selectedItemId) {
                panel.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚔️</div>
                        <div>选择武器查看详情</div>
                    </div>
                `;
                return;
            }

            const item = DATA.items.find(i => i.id === selectedItemId);

            const dungeons = getAvailableDungeons(item);

            let obtainHtml = '';
            if (dungeons.length === 0) {
                obtainHtml = '<div class="no-obtain">该武器暂无已知获取途径</div>';
            } else {
                const allS1Combos = combinations(ALL_S1, 3);

                obtainHtml = '<div class="dungeon-list">' + dungeons.map(d => {
                    const s2Results = [];
                    const s3Results = [];

                    allS1Combos.forEach(s1Combo => {
                        const byS2 = getRelatedItemsByS2(d, s1Combo, item.type2, item.id);
                        if (byS2.length > 0) {
                            s2Results.push({ combo: s1Combo, items: byS2, ids: new Set(byS2.map(i => i.id)) });
                        }
                        const byS3 = getRelatedItemsByS3(d, s1Combo, item.type3, item.id);
                        if (byS3.length > 0) {
                            s3Results.push({ combo: s1Combo, items: byS3, ids: new Set(byS3.map(i => i.id)) });
                        }
                    });

                    const isSubsetOf = (setA, setB) => {
                        for (const id of setA) {
                            if (!setB.has(id)) return false;
                        }
                        return true;
                    };

                    const filterIndependent = (results) => {
                        if (results.length === 0) return [];

                        const deduped = [];
                        const seen = new Set();
                        for (const r of results) {
                            const key = Array.from(r.ids).sort().join(',');
                            if (!seen.has(key)) {
                                seen.add(key);
                                deduped.push(r);
                            }
                        }

                        const independent = [];
                        const sorted = [...deduped].sort((a, b) => b.items.length - a.items.length);
                        for (let i = 0; i < sorted.length; i++) {
                            let isSub = false;
                            for (let j = 0; j < sorted.length; j++) {
                                if (i !== j && sorted[i].items.length < sorted[j].items.length && isSubsetOf(sorted[i].ids, sorted[j].ids)) {
                                    isSub = true;
                                    break;
                                }
                            }
                            if (!isSub) {
                                independent.push(sorted[i]);
                            }
                        }
                        return independent;
                    };

                    const independentS2 = filterIndependent(s2Results);
                    const independentS3 = filterIndependent(s3Results);

                    let relatedHtml = '';

                    if (independentS2.length > 0) {
                        relatedHtml += `<div class="related-items">
                            <div class="related-title">框选Type1+Type2（type2=${item.type2}，${independentS2.length}种组合）</div>
                            <div class="related-list" style="flex-direction:column;gap:8px">`;
                        independentS2.forEach(r => {
                            relatedHtml += `<div style="margin-bottom:6px">
                                <span style="color:#e94560;font-size:11px">type1=${r.combo.join('/')}（${r.items.length}把）</span>
                                <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">`;
                            r.items.forEach(ri => {
                                relatedHtml += `<span class="related-item" data-id="${ri.id}">
                                    <span class="${getRarityClass(ri.rarity)}">${"★".repeat(ri.rarity)}</span>
                                    ${ri.name}<span style="color:#888;font-size:10px"> · ${ri.type2} · ${ri.type3}</span>
                                </span>`;
                            });
                            relatedHtml += `</div></div>`;
                        });
                        relatedHtml += `</div></div>`;
                    }

                    if (independentS3.length > 0) {
                        relatedHtml += `<div class="related-items" style="margin-top:12px">
                            <div class="related-title">框选Type1+Type3（type3=${item.type3}，${independentS3.length}种组合）</div>
                            <div class="related-list" style="flex-direction:column;gap:8px">`;
                        independentS3.forEach(r => {
                            relatedHtml += `<div style="margin-bottom:6px">
                                <span style="color:#ffd700;font-size:11px">type1=${r.combo.join('/')}（${r.items.length}把）</span>
                                <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">`;
                            r.items.forEach(ri => {
                                relatedHtml += `<span class="related-item" data-id="${ri.id}">
                                    <span class="${getRarityClass(ri.rarity)}">${"★".repeat(ri.rarity)}</span>
                                    ${ri.name}<span style="color:#888;font-size:10px"> · ${ri.type2} · ${ri.type3}</span>
                                </span>`;
                            });
                            relatedHtml += `</div></div>`;
                        });
                        relatedHtml += `</div></div>`;
                    }

                    return `
                        <div class="dungeon-item">
                            <div class="dungeon-name">${d.name}</div>
                            <div class="dungeon-pools">
                                <span class="pool-tag s2">Type2: ${d.type2_pool.slice(0, 4).join(' / ')}...</span>
                                <span class="pool-tag s3">Type3: ${d.type3_pool.slice(0, 4).join(' / ')}...</span>
                            </div>
                            ${relatedHtml}
                        </div>
                    `;
                }).join('') + '</div>';
            }

            panel.innerHTML = `
                <div class="detail-header">
                    <div class="detail-icon">${getTypeIcon(item.type)}</div>
                    <div class="detail-title">
                        <h1>${item.name}</h1>
                        <div class="meta">
                            <span class="item-rarity ${getRarityClass(item.rarity)}">${"★".repeat(item.rarity)}</span>
                            <span class="type-icon">${getTypeIcon(item.type)}</span>
                            <span>${item.type}</span>
                        </div>
                    </div>
                </div>
                <div class="detail-content">
                    <div class="detail-section">
                        <h3>武器属性</h3>
                        <div class="attr-display">
                            <span class="attr-tag pos1">位置一：${item.type1}</span>
                            <span class="attr-tag pos2">位置二：${item.type2}</span>
                            <span class="attr-tag pos3">位置三：${item.type3}</span>
                        </div>
                    </div>
                    <div class="detail-section obtain-section">
                        <h3>可获取地点</h3>
                        ${obtainHtml}
                    </div>
                </div>
            `;

            panel.querySelectorAll('.related-item[data-id]').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    selectedItemId = id;
                    document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
                    const card = document.querySelector(`.item-card[data-id="${id}"]`);
                    if (card) {
                        card.classList.add('selected');
                        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                    renderDetail();
                });
            });
        }

    </script>
</body>
</html>
